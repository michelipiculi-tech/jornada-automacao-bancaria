<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antes de credenciar — Pix Imediato — Jornada Automação Bancária</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --navy:#2b3a54; --green:#66cc66; --green-pale:#eaf7ec; --text:#424242; --bg:#f7f9f8; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Roboto', Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
  .wrap { width: 100%; margin: 0 auto; padding: 16px 18px 22px; }
  .hero { border-radius: 14px; padding: 18px 20px; margin: 0 0 16px; }
  .eyebrow { display:inline-flex; align-items:center; gap:6px; color:var(--green); font-weight:700; font-size:11px; letter-spacing:0.6px; text-transform:uppercase; margin:0 0 8px; }
  .eyebrow .dot { width:6px; height:6px; border-radius:50%; background:var(--green); }
  h1.title { color:var(--navy); font-weight:900; font-size:22px; line-height:1.15; margin:0 0 6px; letter-spacing:-0.01em; }
  p.desc { color:#5c6672; font-size:13px; line-height:1.45; margin:0; max-width:640px; }
  .aula-tag { color:#8a94a0; font-size:11px; font-weight:500; margin:0 0 5px; }
  .section { margin-bottom:16px; }
  .section h2 { color:var(--navy); font-weight:700; font-size:15.5px; line-height:1.2; margin:0 0 7px; }
  .section .hr { border:none; border-top:1px solid #e4e8e6; margin:0 0 9px; }
  p.body-text { color:var(--text); font-size:12.5px; line-height:1.42; margin:0 0 7px; }
  .caption { color:#7c8a97; font-size:11px; font-style:italic; margin:0 0 7px; }
  .footer-note { margin-top:16px; padding-top:10px; border-top:1px solid #e4e8e6; color:#9aa4ae; font-size:11px; }
</style>
</head>
<body>
  <div class="wrap">
<div class="section">
<h2>Antes de credenciar</h2>
<hr class="hr"/>
<div style="background:#2b3a54;border-radius:14px;padding:11px 14px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
<p style="margin:0 0 4px;color:#66cc66;font-weight:bold;font-size:12.5px;">⚠️ Atenção!</p>
<p style="margin:0;color:#ffffff;font-size:12px;line-height:1.42;">O sistema não valida os dados bancários (Agência, Conta, Chave Pix) junto ao banco no momento do credenciamento. É crucial confirmar todas as informações com o gerente do banco antes de credenciar.</p>
</div>
</div>
    <div class="footer-note">Jornada Automação Bancária · Sankhya Finance</div>
  </div>
